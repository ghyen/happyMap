<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울시 청년매입임대주택 지도</title>
    <meta name="description" content="서울시 청년매입임대주택을 지도에서 검색하고, 자치구·면적·보증금·월세·출퇴근 시간으로 필터링하세요. 무료 오픈소스 서비스.">
    <meta property="og:title" content="서울시 청년매입임대주택 지도">
    <meta property="og:description" content="서울시 청년매입임대주택을 지도에서 검색하고, 조건별로 필터링하세요.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ko_KR">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
        <!-- 설정 패널 (접기/펼치기) -->
        <aside id="settings-panel" class="collapsed">
            <button id="settings-toggle">⚙</button>
            <div class="settings-content">
                <h2>설정</h2>

                <div class="setting-group">
                    <label>테마</label>
                    <button id="theme-toggle" class="btn-theme">다크모드</button>
                </div>

                <div class="setting-group">
                    <label for="dataset-select">데이터셋</label>
                    <select id="dataset-select">
                        <option value="data/properties.json">2026년 1차 장기미임대</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="office-address">회사 위치</label>
                    <input type="text" id="office-address" placeholder="주소 입력">
                    <button id="save-office" class="btn-primary">저장 &amp; 재계산</button>
                    <div id="office-status" class="setting-status"></div>
                </div>

                <div class="setting-group">
                    <label for="conversion-type">보증금/월세 전환</label>
                    <select id="conversion-type">
                        <option value="none">전환 없음</option>
                        <option value="jeonse">전세전환 (보증금↑ 월세↓)</option>
                        <option value="monthly">월세전환 (보증금↓ 월세↑)</option>
                    </select>
                    <div id="conversion-slider-wrap" class="conversion-slider-wrap">
                        <div class="conversion-slider-header">
                            <span>전환 비율</span>
                            <span id="conversion-percent-value">0%</span>
                        </div>
                        <input type="range" id="conversion-percent" min="0" max="80" value="0" step="10">
                    </div>
                    <div id="conversion-info" class="setting-status"></div>
                </div>

                <div class="setting-group">
                    <label>파일 → 데이터셋 생성</label>
                    <div class="pdf-drop-zone" id="pdf-drop-zone">
                        <input type="file" id="pdf-file" accept=".pdf,.xlsx,.xls" hidden>
                        <span class="pdf-drop-text">PDF / Excel 파일을 드래그하거나 클릭하여 선택</span>
                        <span id="pdf-filename" class="pdf-filename"></span>
                    </div>
                    <input type="text" id="dataset-name" placeholder="데이터셋 이름 (예: 2026년 2차)">
                    <button id="pdf-generate-btn" class="btn-primary" disabled>데이터셋 생성</button>
                    <div id="pdf-progress" class="pdf-progress" hidden>
                        <div class="pdf-progress-bar"><div id="pdf-progress-fill" class="pdf-progress-fill"></div></div>
                        <span id="pdf-progress-text" class="setting-status"></span>
                    </div>
                </div>

                <div class="settings-footer">
                    <a href="https://github.com/ghyen/happyMap" target="_blank" class="footer-link">
                        <span class="footer-icon">GitHub</span>
                    </a>
                    <a href="https://qr.kakaopay.com/Ej78FFgaw" target="_blank" class="footer-link sponsor">
                        <span class="footer-icon">후원하기</span>
                    </a>
                </div>
            </div>
        </aside>

        <!-- 사이드바 -->
        <aside id="sidebar">
            <header class="sidebar-header">
                <div class="header-top">
                    <h1>청년매입임대주택</h1>
                    <div class="auth-area">
                        <button id="login-btn" class="btn-kakao-login">카카오 로그인</button>
                        <div id="user-info" class="user-info" style="display:none">
                            <img class="profile-img" src="" alt="">
                            <span class="nickname"></span>
                            <button id="logout-btn" class="btn-logout">로그아웃</button>
                        </div>
                    </div>
                </div>
                <p class="subtitle" id="dataset-subtitle">서울시 2026년 1차 장기미임대 매입임대주택</p>
            </header>

            <!-- 검색 섹션 -->
            <section class="search-section">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="주소, 단지번호로 검색">
                    <button id="search-btn" class="btn-search">검색</button>
                </div>
            </section>

            <!-- 필터 섹션 -->
            <section class="filter-section">
                <div class="filter-header">
                    <h2>필터</h2>
                    <button id="toggle-filter" class="btn-toggle">접기</button>
                </div>
                <div id="filter-content">

                <!-- 자치구 필터 -->
                <div class="filter-group">
                    <label for="district-filter">자치구</label>
                    <select id="district-filter">
                        <option value="">전체</option>
                    </select>
                </div>

                <!-- 면적 필터 -->
                <div class="filter-group">
                    <label>전용면적 (㎡)</label>
                    <div class="range-inputs">
                        <input type="number" id="area-min" placeholder="최소" min="0">
                        <span>~</span>
                        <input type="number" id="area-max" placeholder="최대" min="0">
                    </div>
                </div>

                <!-- 보증금 필터 -->
                <div class="filter-group">
                    <label>임대보증금 (만원)</label>
                    <div class="range-inputs">
                        <input type="number" id="deposit-min" placeholder="최소" min="0">
                        <span>~</span>
                        <input type="number" id="deposit-max" placeholder="최대" min="0">
                    </div>
                </div>

                <!-- 월임대료 필터 -->
                <div class="filter-group">
                    <label>월임대료 (만원)</label>
                    <div class="range-inputs">
                        <input type="number" id="rent-min" placeholder="최소" min="0">
                        <span>~</span>
                        <input type="number" id="rent-max" placeholder="최대" min="0">
                    </div>
                </div>

                <!-- 방개수 필터 -->
                <div class="filter-group">
                    <label for="rooms-filter">방개수</label>
                    <select id="rooms-filter">
                        <option value="">전체</option>
                        <option value="1">1개</option>
                        <option value="2">2개</option>
                        <option value="3">3개</option>
                        <option value="4">4개</option>
                    </select>
                </div>

                <!-- 승강기 필터 -->
                <div class="filter-group">
                    <label for="elevator-filter">승강기</label>
                    <select id="elevator-filter">
                        <option value="">전체</option>
                        <option value="true">있음</option>
                        <option value="false">없음</option>
                    </select>
                </div>

                <!-- 소요시간 필터 -->
                <div class="filter-group">
                    <label>회사까지 소요시간 (분)</label>
                    <div class="range-inputs">
                        <input type="number" id="commute-max" placeholder="최대" min="0">
                        <span>분 이내</span>
                    </div>
                </div>

                <div class="filter-buttons">
                    <button id="apply-filter" class="btn-primary">필터 적용</button>
                    <button id="reset-filter" class="btn-secondary">초기화</button>
                </div>
                </div>
            </section>

            <!-- 검색 결과 리스트 -->
            <section class="list-section">
                <div class="list-header">
                    <h2>매물 목록</h2>
                    <div class="list-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="show-in-bounds">
                            <span>현재 지도 영역만</span>
                        </label>
                        <span id="result-count">0건</span>
                    </div>
                </div>
                <ul id="property-list"></ul>
            </section>
        </aside>

        <!-- 지도 영역 -->
        <main id="map-container">
            <div id="map"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>지도를 불러오는 중...</p>
            </div>
        </main>

        <!-- 모바일 뷰 전환 -->
        <nav id="mobile-view-switcher" aria-label="모바일 보기 전환">
            <button id="mobile-show-list" class="mobile-switch-btn active" type="button">목록</button>
            <button id="mobile-show-map" class="mobile-switch-btn" type="button">지도</button>
            <button id="mobile-show-settings" class="mobile-switch-btn" type="button">설정</button>
        </nav>
    </div>

    <!-- Vercel Analytics & Speed Insights -->

    <!-- 설정 (API 키) -->
    <script src="js/config.js"></script>

    <!-- 앱 스크립트 -->
    <script src="js/auth.js"></script>
    <script src="js/social.js"></script>
    <script src="js/dataset-store.js"></script>
    <script src="js/pdf-parser.js"></script>
    <script src="js/excel-parser.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/map.js"></script>
    <script src="js/markers.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
